<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Aidat Takip Sistemi</title>

<style>
body{
    font-family: Arial;
    background:#f4f6f9;
    text-align:center;
    background: url('https://kelesyapigrubu.com/wp-content/uploads/2022/05/jOkkvxad-skyscrapers-sunset.jpg');

    
}

.container{
    width:700px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,button{
    padding:10px;
    margin:5px;
}

button{
    background:#2d89ef;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{
    background:#1b5fa7;
}

table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
}

th,td{
    padding:10px;
    border-bottom:1px solid #ddd;
}

.odendi{
    color:green;
    font-weight:bold;
}

.odenmedi{
    color:red;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h2>Aidat Takip Sistemi</h2>

<input type="text" id="ad" placeholder="Ad Soyad">
<input type="number" id="aidat" placeholder="Aidat Tutarı">
<button onclick="ekle()">Kişi Ekle</button>

<table>
<thead>
<tr>
<th>Ad</th>
<th>Aidat</th>
<th>Durum</th>
<th>İşlem</th>
</tr>
</thead>

<tbody id="liste"></tbody>

</table>

</div>

<script src="duess.js"></script>

</body>
</html>
